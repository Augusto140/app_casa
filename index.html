<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monitor de Temperatura - Estufa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .sensors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .sensor-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }
        
        .sensor-card:hover {
            transform: translateY(-5px);
        }
        
        .sensor-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .sensor-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .temperature {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .temperature small {
            font-size: 20px;
        }
        
        .last-update {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chart-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }
        
        .period-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .period-btn {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .period-btn.active {
            background: #667eea;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-dots::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }
        
        @media (max-width: 768px) {
            .temperature {
                font-size: 36px;
            }
            
            .sensor-card {
                padding: 15px;
            }
            
            button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌡️ Monitor de Temperatura da Estufa</h1>
            <div class="status-bar">
                <div class="status" id="espStatus">
                    <span>🔌 ESP32:</span>
                    <span id="statusText">Verificando...</span>
                </div>
                <div class="status" id="sdStatus">
                    <span>💾 SD Card:</span>
                    <span id="sdStatusText">---</span>
                </div>
                <div>
                    <span>📊 Intervalo:</span>
                    <span id="intervaloInfo">---</span>
                </div>
                <div>
                    <span>📅 Última atualização:</span>
                    <span id="lastFetchTime">---</span>
                </div>
            </div>
        </div>
        
        <div class="sensors-grid">
            <div class="sensor-card">
                <div class="sensor-icon">💧</div>
                <div class="sensor-title">Temperatura da Água</div>
                <div class="temperature" id="tempAgua">--.-<small>°C</small></div>
                <div class="last-update" id="updateAgua">---</div>
            </div>
            
            <div class="sensor-card">
                <div class="sensor-icon">🌡️</div>
                <div class="sensor-title">Temperatura da Estufa</div>
                <div class="temperature" id="tempEstufa">--.-<small>°C</small></div>
                <div class="last-update" id="updateEstufa">---</div>
            </div>
            
            <div class="sensor-card">
                <div class="sensor-icon">🌤️</div>
                <div class="sensor-title">Temperatura Externa</div>
                <div class="temperature" id="tempExterna">--.-<small>°C</small></div>
                <div class="last-update" id="updateExterna">---</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="button-group">
                <button class="btn-primary" onclick="forcarColeta()">🔄 Forçar Coleta</button>
                <button class="btn-secondary" onclick="baixarDados()">📥 Baixar Dados CSV</button>
                <button class="btn-primary" onclick="atualizarDados()">🔄 Atualizar</button>
            </div>
            
            <div class="period-selector">
                <button class="period-btn active" data-period="24h" onclick="mudarPeriodo('24h')">Últimas 24h</button>
                <button class="period-btn" data-period="semana" onclick="mudarPeriodo('semana')">Última Semana</button>
                <button class="period-btn" data-period="mes" onclick="mudarPeriodo('mes')">Último Mês</button>
                <button class="period-btn" data-period="ano" onclick="mudarPeriodo('ano')">Último Ano</button>
                <button class="period-btn" data-period="todo" onclick="mudarPeriodo('todo')">Todo Histórico</button>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">📈 Histórico de Temperaturas</div>
            <canvas id="tempChart"></canvas>
        </div>
    </div>
    
    <script>
        // Configuração
        const ESP32_IP = '192.168.4.1'; // IP padrão do ESP32 em modo AP
        let chart = null;
        let periodoAtual = '24h';
        let autoUpdateInterval = null;
        
        // Função para fazer requisições ao ESP32
        async function fetchESP32(endpoint, options = {}) {
            const url = `http://${ESP32_IP}${endpoint}`;
            try {
                const response = await fetch(url, {
                    ...options,
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error(`Erro ao acessar ${endpoint}:`, error);
                throw error;
            }
        }
        
        // Atualizar status do ESP32
        async function atualizarStatus() {
            try {
                const status = await fetchESP32('/api/status');
                const statusDiv = document.getElementById('espStatus');
                const statusText = document.getElementById('statusText');
                const sdStatusText = document.getElementById('sdStatusText');
                const intervaloInfo = document.getElementById('intervaloInfo');
                
                statusText.textContent = 'Online';
                statusDiv.className = 'status online';
                
                sdStatusText.textContent = status.sd_card ? 'OK' : 'Erro';
                intervaloInfo.textContent = `${status.intervalo_coleta} min`;
                
                if (!status.sd_card) {
                    sdStatusText.style.color = '#721c24';
                } else {
                    sdStatusText.style.color = '#155724';
                }
            } catch (error) {
                const statusDiv = document.getElementById('espStatus');
                const statusText = document.getElementById('statusText');
                statusText.textContent = 'Offline';
                statusDiv.className = 'status offline';
            }
        }
        
        // Atualizar dados em tempo real
        async function atualizarDados() {
            try {
                const dados = await fetchESP32('/api/dados');
                
                if (dados.valida) {
                    document.getElementById('tempAgua').innerHTML = dados.agua.toFixed(1) + '<small>°C</small>';
                    document.getElementById('tempEstufa').innerHTML = dados.estufa.toFixed(1) + '<small>°C</small>';
                    document.getElementById('tempExterna').innerHTML = dados.externa.toFixed(1) + '<small>°C</small>';
                    
                    const agora = new Date();
                    const horaStr = agora.toLocaleTimeString('pt-BR');
                    document.getElementById('updateAgua').innerHTML = `Atualizado: ${horaStr}`;
                    document.getElementById('updateEstufa').innerHTML = `Atualizado: ${horaStr}`;
                    document.getElementById('updateExterna').innerHTML = `Atualizado: ${horaStr}`;
                    document.getElementById('lastFetchTime').innerHTML = horaStr;
                } else {
                    document.getElementById('tempAgua').innerHTML = 'Erro<small>°C</small>';
                    document.getElementById('tempEstufa').innerHTML = 'Erro<small>°C</small>';
                    document.getElementById('tempExterna').innerHTML = 'Erro<small>°C</small>';
                }
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('tempAgua').innerHTML = 'Offline<small>°C</small>';
                document.getElementById('tempEstufa').innerHTML = 'Offline<small>°C</small>';
                document.getElementById('tempExterna').innerHTML = 'Offline<small>°C</small>';
            }
        }
        
        // Carregar histórico e atualizar gráfico
        async function carregarHistorico(periodo) {
            const chartContainer = document.querySelector('.chart-container');
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'loading';
            loadingMsg.innerHTML = 'Carregando dados históricos<span class="loading-dots"></span>';
            
            const existingLoading = document.querySelector('.loading');
            if (!existingLoading) {
                chartContainer.appendChild(loadingMsg);
            }
            
            try {
                let url = '/api/historico';
                if (periodo !== 'todo') {
                    url += `?periodo=${periodo}`;
                }
                
                const data = await fetchESP32(url);
                
                if (loadingMsg) loadingMsg.remove();
                
                if (data.dados && data.dados.length > 0) {
                    atualizarGrafico(data.dados);
                } else {
                    mostrarErro('Nenhum dado encontrado para o período selecionado');
                }
            } catch (error) {
                if (loadingMsg) loadingMsg.remove();
                mostrarErro('Erro ao carregar dados históricos: ' + error.message);
            }
        }
        
        // Atualizar gráfico
        function atualizarGrafico(dados) {
            const labels = dados.map(d => {
                const data = new Date(d.timestamp * 1000);
                return data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            });
            
            const aguaData = dados.map(d => d.agua);
            const estufaData = dados.map(d => d.estufa);
            const externaData = dados.map(d => d.externa);
            
            if (chart) {
                chart.destroy();
            }
            
            const ctx = document.getElementById('tempChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Temperatura da Água',
                            data: aguaData,
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Temperatura da Estufa',
                            data: estufaData,
                            borderColor: 'rgb(34, 197, 94)',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Temperatura Externa',
                            data: externaData,
                            borderColor: 'rgb(249, 115, 22)',
                            backgroundColor: 'rgba(249, 115, 22, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    scales: {
                        y: {
                            title: {
                                display: true,
                                text: 'Temperatura (°C)'
                            },
                            min: 0,
                            max: 50
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Data/Hora'
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                autoSkip: true,
                                maxTicksLimit: 10
                            }
                        }
                    }
                }
            });
        }
        
        // Forçar coleta
        async function forcarColeta() {
            try {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '⏳ Coletando...';
                btn.disabled = true;
                
                await fetchESP32('/api/coletar', { method: 'POST' });
                
                btn.textContent = '✓ Coletado!';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
                
                await atualizarDados();
                await carregarHistorico(periodoAtual);
            } catch (error) {
                alert('Erro ao forçar coleta: ' + error.message);
                const btn = event.target;
                btn.textContent = 'Forçar Coleta';
                btn.disabled = false;
            }
        }
        
        // Baixar dados
        async function baixarDados() {
            try {
                window.open(`http://${ESP32_IP}/api/download`, '_blank');
            } catch (error) {
                alert('Erro ao baixar dados: ' + error.message);
            }
        }
        
        // Mudar período
        function mudarPeriodo(periodo) {
            periodoAtual = periodo;
            
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            carregarHistorico(periodo);
        }
        
        // Mostrar erro
        function mostrarErro(mensagem) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = mensagem;
            
            const chartContainer = document.querySelector('.chart-container');
            const existingError = document.querySelector('.error');
            
            if (existingError) {
                existingError.remove();
            }
            
            chartContainer.insertBefore(errorDiv, chartContainer.firstChild);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }
        
        // Inicializar
        async function init() {
            await atualizarStatus();
            await atualizarDados();
            await carregarHistorico('24h');
            
            // Auto-update a cada 10 segundos para dados em tempo real
            autoUpdateInterval = setInterval(() => {
                atualizarDados();
            }, 10000);
            
            // Atualizar status a cada 30 segundos
            setInterval(() => {
                atualizarStatus();
            }, 30000);
        }
        
        // Verificar conectividade com ESP32
        async function verificarConectividade() {
            try {
                await fetchESP32('/api/status');
                document.body.style.opacity = '1';
            } catch (error) {
                console.warn('ESP32 não encontrado. Certifique-se de estar conectado à rede Estufa_DataLogger');
            }
        }
        
        // Iniciar aplicação
        init();
        verificarConectividade();
    </script>
</body>
</html>
